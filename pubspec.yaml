name: avc_flutter
description: AVC Flutter Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # UI & Navigation
  go_router: ^13.0.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  syncfusion_flutter_charts: ^33.1.44
  flutter_launcher_icons: ^0.13.1
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  web_socket_channel: ^2.4.0
  
  # Database & Storage
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.1.0
  shared_preferences: ^2.2.2
  
  # Platform Integration
  wifi_iot: any
  network_info_plus: ^5.0.0
  device_info_plus: ^9.1.0
  package_info_plus: ^4.2.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.4
  
  # Notifications
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^16.1.0
  
  # Analytics & Monitoring
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7
  logger: ^2.0.0
  
  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.3.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  
  # Testing
  mockito: ^5.4.2
  test: ^1.24.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  


# iOS specific configuration
ios:
  deployment-target: '14.0'
  uses-non-exempt-encryption: false
  info-plist:
    NSLocalNetworkUsageDescription: Required to discover AVC devices on your local network
    NSBonjourServices:
      - _avc-device._tcp
      - _avc-device._udp
    UIBackgroundModes:
      - fetch
      - remote-notification
    NSCameraUsageDescription: Required for QR code scanning during device pairing
    NSLocationWhenInUseUsageDescription: Required for WiFi network scanning
    FirebaseAppDelegateProxyEnabled: false

# Android specific configuration
android:
  compileSdkVersion: 34
  minSdkVersion: 26
  targetSdkVersion: 34
  
  manifestPlaceholders:
    applicationLabel: "AVC"
  
  defaultConfig:
    applicationId: "com.avc.mobile"
    versionCode: 1
    versionName: "1.0.0"
    multiDexEnabled: true
  
  buildTypes:
    release:
      minifyEnabled: true
      proguardFiles:
        - proguard-rules.pro
      shrinkResources: true